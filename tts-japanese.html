<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>テキスト読み上げ</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green:   #1db954;
      --green-h: #1ed760;
      --bg:      #121212;
      --surface: #181818;
      --surface2:#282828;
      --surface3:#3e3e3e;
      --text:    #ffffff;
      --subtext: #b3b3b3;
      --radius:  8px;
    }

    body {
      font-family: "Circular", "Hiragino Sans", "Yu Gothic UI", -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100dvh;
      display: grid;
      grid-template-rows: 1fr auto;
      overflow: hidden;
    }

    /* ── Main scroll area ── */
    .main {
      overflow-y: auto;
      padding: 14px 20px 8px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      min-height: 0;
    }

    /* ── Artwork + meta ── */
    .episode-header {
      width: 100%;
      max-width: 480px;
      display: flex;
      gap: 14px;
      align-items: center;
    }

    .artwork {
      width: 64px;
      height: 64px;
      border-radius: var(--radius);
      background: var(--surface2);
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .artwork svg { opacity: 0.4; }

    .episode-meta { flex: 1; min-width: 0; }

    .episode-title {
      font-size: 1rem;
      font-weight: 700;
      line-height: 1.3;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* ── Text input panel ── */
    .text-panel {
      width: 100%;
      max-width: 480px;
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
    }

    .panel-label {
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--subtext);
      margin-bottom: 6px;
    }

    textarea, .text-display {
      width: 100%;
      flex: 1;
      min-height: 100px;
      background: var(--surface2);
      border: 1px solid transparent;
      border-radius: var(--radius);
      padding: 14px 16px;
      font-size: 0.9rem;
      font-family: inherit;
      color: var(--text);
      line-height: 1.7;
      resize: none;
      outline: none;
      transition: border-color 0.15s;
    }
    textarea:focus { border-color: var(--subtext); }
    textarea::placeholder { color: var(--green); }

    .text-display {
      overflow-y: auto;
      white-space: pre-wrap;
      word-break: break-all;
      display: none;
      cursor: default;
    }
    .text-display mark {
      background: none;
      color: var(--green);
      font-weight: 700;
    }

    /* ── Progress bar ── */
    .progress-section {
      width: 100%;
      max-width: 480px;
    }

    .progress-bar-wrap {
      position: relative;
      height: 28px;
      display: flex;
      align-items: center;
      cursor: pointer;
      user-select: none;
    }
    .progress-bar-wrap.dragging { cursor: grabbing; }
    .progress-bar-wrap.dragging .progress-fill { background: var(--green); }
    .progress-bar-wrap.dragging .progress-thumb { opacity: 1; }

    .progress-track {
      position: absolute;
      left: 0; right: 0;
      height: 4px;
      background: var(--surface3);
      border-radius: 2px;
      pointer-events: none;
    }

    .progress-fill {
      height: 100%;
      width: 0%;
      background: var(--subtext);
      border-radius: 2px;
      transition: background 0.1s;
      position: relative;
    }

    .progress-bar-wrap:hover .progress-fill { background: var(--green); }
    .progress-bar-wrap:hover .progress-thumb { opacity: 1; }

    .progress-thumb {
      position: absolute;
      right: -6px;
      top: 50%;
      transform: translateY(-50%);
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: var(--text);
      opacity: 0;
      transition: opacity 0.1s;
    }

    .time-row {
      display: flex;
      justify-content: space-between;
      margin-top: 8px;
      font-size: 0.7rem;
      color: var(--subtext);
      font-weight: 500;
    }

    /* ── Player bar ── */
    .player-bar {
      background: var(--surface);
      border-top: 1px solid var(--surface2);
      padding: 8px 20px max(12px, env(safe-area-inset-bottom));
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }

    /* ── Main controls ── */
    .main-controls {
      display: flex;
      align-items: center;
      gap: 20px;
      margin-bottom: 2px;
    }

    .ctrl-btn {
      background: none;
      border: none;
      color: var(--subtext);
      cursor: pointer;
      padding: 6px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color 0.15s, transform 0.1s;
      flex-shrink: 0;
    }
    .ctrl-btn:hover { color: var(--text); }
    .ctrl-btn:active { transform: scale(0.93); }
    .ctrl-btn:disabled { color: var(--surface3); cursor: not-allowed; transform: none; }

    .play-btn {
      width: 48px;
      height: 48px;
      background: var(--text);
      border-radius: 50%;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.1s, background 0.15s;
      flex-shrink: 0;
    }
    .play-btn:hover { transform: scale(1.06); background: #fff; }
    .play-btn:active { transform: scale(0.96); }
    .play-btn svg { color: #000; }

    /* ── Secondary controls ── */
    .secondary-controls {
      width: 100%;
      max-width: 480px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 6px;
    }

    .speed-btn {
      background: none;
      border: 1px solid var(--subtext);
      color: var(--subtext);
      border-radius: 4px;
      font-size: 0.72rem;
      font-weight: 700;
      padding: 3px 7px;
      cursor: pointer;
      font-family: inherit;
      transition: color 0.15s, border-color 0.15s;
      letter-spacing: 0.02em;
    }
    .speed-btn:hover { color: var(--text); border-color: var(--text); }

    .voice-pill {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .voice-pill select {
      background: none;
      border: none;
      color: var(--subtext);
      font-size: 0.75rem;
      font-family: inherit;
      cursor: pointer;
      outline: none;
      max-width: 160px;
    }
    .voice-pill select option { background: var(--surface2); color: var(--text); }

    /* ── No support ── */
    .no-support {
      display: none;
      background: #2a2a2a;
      border: 1px solid #444;
      border-radius: var(--radius);
      padding: 14px 18px;
      font-size: 0.85rem;
      color: #ccc;
      max-width: 480px;
      width: 100%;
    }
  </style>
</head>
<body>

  <div class="main">
    <div class="no-support" id="no-support">
      お使いのブラウザは Web Speech API に対応していません。Chrome または Safari をお使いください。
    </div>

    <!-- Episode header -->
    <div class="episode-header">
      <div class="episode-meta">
        <div class="episode-title" id="episode-title">テキストを貼り付けてください</div>
      </div>
    </div>

    <!-- Text input / display -->
    <div class="text-panel">
      <textarea id="text-input" placeholder="ここにテキストを貼り付けてください..."></textarea>
      <div id="text-display" class="text-display"></div>
    </div>

    <!-- Progress -->
    <div class="progress-section">
      <div class="progress-bar-wrap" id="progress-wrap">
        <div class="progress-track">
          <div class="progress-fill" id="progress-fill">
            <div class="progress-thumb"></div>
          </div>
        </div>
      </div>
      <div class="time-row">
        <span id="time-elapsed">0:00</span>
        <span id="time-remain">0:00</span>
      </div>
    </div>
  </div>

  <!-- Player bar -->
  <div class="player-bar">
    <div class="main-controls">
      <!-- Skip back 15s -->
      <button class="ctrl-btn" id="btn-rewind" title="15秒戻る" disabled>
        <svg width="30" height="30" viewBox="0 0 28 28" fill="none">
          <path d="M 14 6 A 10 10 0 1 0 17.4 6.6"
                stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/>
          <path d="M 18 3 L 14 6 L 18 9"
                stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
          <text x="14" y="21" text-anchor="middle" font-size="8.5" font-weight="700"
                font-family="sans-serif" fill="currentColor">15</text>
        </svg>
      </button>

      <!-- Play / Pause -->
      <button class="play-btn" id="btn-play-pause">
        <svg id="icon-play" width="22" height="22" viewBox="0 0 24 24" fill="currentColor">
          <path d="M8 5v14l11-7z"/>
        </svg>
        <svg id="icon-pause" width="22" height="22" viewBox="0 0 24 24" fill="currentColor" style="display:none">
          <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>
        </svg>
      </button>

      <!-- Stop -->
      <button class="ctrl-btn" id="btn-stop" disabled>
        <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor">
          <path d="M6 6h12v12H6z"/>
        </svg>
      </button>
    </div>

    <!-- Secondary controls -->
    <div class="secondary-controls">
      <button class="speed-btn" id="speed-btn">1×</button>
      <div class="voice-pill">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#b3b3b3" stroke-width="2">
          <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
          <path d="M19 10v2a7 7 0 0 1-14 0v-2M12 19v4M8 23h8"/>
        </svg>
        <select id="voice-select"></select>
      </div>
    </div>
  </div>

  <script>
    const synth = window.speechSynthesis;
    if (!synth) document.getElementById('no-support').style.display = 'block';

    const textInput    = document.getElementById('text-input');
    const textDisplay  = document.getElementById('text-display');
    const voiceSelect  = document.getElementById('voice-select');
    const btnPlayPause = document.getElementById('btn-play-pause');
    const btnStop      = document.getElementById('btn-stop');
    const btnRewind    = document.getElementById('btn-rewind');
    const iconPlay     = document.getElementById('icon-play');
    const iconPause    = document.getElementById('icon-pause');
    const progressFill = document.getElementById('progress-fill');
    const timeElapsed  = document.getElementById('time-elapsed');
    const timeRemain   = document.getElementById('time-remain');
    const episodeTitle = document.getElementById('episode-title');
    const speedBtn     = document.getElementById('speed-btn');

    const SPEEDS = [0.5, 0.75, 1, 1.25, 1.5, 2];
    let speedIdx = 3;
    speedBtn.textContent = '1.25×';

    speedBtn.addEventListener('click', () => {
      speedIdx = (speedIdx + 1) % SPEEDS.length;
      const s = SPEEDS[speedIdx];
      speedBtn.textContent = s === 1 ? '1×' : s + '×';
      if (synth.speaking && !synth.paused) {
        synth.cancel();
        cancelAnimationFrame(rafId);
        startTime = Date.now();
        isPaused  = false;
        rafId = requestAnimationFrame(tickProgress);
        speakFrom(chunkIdx);
      }
    });

    // voices
    function loadVoices() {
      const all = synth.getVoices();
      if (!all.length) return;
      const ja    = all.filter(v => v.lang.startsWith('ja'));
      const other = all.filter(v => !v.lang.startsWith('ja'));
      const src   = [...ja, ...other];
      const prev  = voiceSelect.selectedOptions[0]?.dataset.name;
      voiceSelect.innerHTML = '';
      src.forEach(v => {
        const o = document.createElement('option');
        o.textContent  = ja.length > 1 ? `${v.name} (${v.lang})` : v.name;
        o.dataset.name = v.name;
        if (v.name === prev) o.selected = true;
        voiceSelect.appendChild(o);
      });
    }
    loadVoices();
    if (synth.onvoiceschanged !== undefined) synth.onvoiceschanged = loadVoices;
    // iOS: voices load after first user gesture
    document.addEventListener('touchstart', loadVoices, { once: true });

    // episode title from textarea
    textInput.addEventListener('input', () => {
      const t = textInput.value.trim();
      episodeTitle.textContent = t
        ? t.replace(/\s+/g, ' ').slice(0, 60) + (t.length > 60 ? '…' : '')
        : 'テキストを貼り付けてください';
    });

    // ── Highlight helpers ──
    function escapeHtml(s) {
      return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    function highlightAt(globalStart, len) {
      const text   = textInput.value;
      const end    = Math.min(globalStart + len, text.length);
      const before = escapeHtml(text.slice(0, globalStart));
      const word   = escapeHtml(text.slice(globalStart, end));
      const after  = escapeHtml(text.slice(end));
      textDisplay.innerHTML = before + '<mark>' + word + '</mark>' + after;
      const mark = textDisplay.querySelector('mark');
      if (mark) mark.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
    }

    function showDisplay() {
      textInput.style.display   = 'none';
      textDisplay.style.display = 'block';
      textDisplay.textContent   = textInput.value;
    }

    function hideDisplay() {
      textDisplay.style.display = 'none';
      textDisplay.innerHTML    = '';
      textInput.style.display  = '';
    }

    // ── Progress / timer ──
    let startTime  = null;
    let totalChars = 0;
    let rafId      = null;
    let isPaused   = false;
    let pauseAt    = 0;

    function fmt(sec) {
      const m = Math.floor(sec / 60);
      const s = Math.floor(sec % 60);
      return `${m}:${s.toString().padStart(2, '0')}`;
    }

    function estimateDuration(chars) {
      return chars / (5 * SPEEDS[speedIdx]);
    }

    function tickProgress() {
      if (!startTime) return;
      const secs  = (Date.now() - startTime) / 1000 + pauseAt;
      const total = estimateDuration(totalChars);
      const ratio = Math.min(secs / total, 1);
      progressFill.style.width = (ratio * 100) + '%';
      timeElapsed.textContent  = fmt(secs);
      timeRemain.textContent   = '-' + fmt(Math.max(0, total - secs));
      if (ratio < 1) rafId = requestAnimationFrame(tickProgress);
    }

    function setPlaying(playing) {
      iconPlay.style.display  = playing ? 'none' : '';
      iconPause.style.display = playing ? ''     : 'none';
      btnStop.disabled        = !playing && !isPaused;
      btnRewind.disabled      = !playing && !isPaused;
    }

    // ── Chunks ──
    let chunks      = [];
    let chunkStarts = [];
    let chunkIdx    = 0;

    function buildChunks(text) {
      chunks      = text.match(/.{1,200}/g) || [text];
      chunkStarts = [];
      let pos = 0;
      chunks.forEach(c => { chunkStarts.push(pos); pos += c.length; });
    }

    function speakFrom(idx) {
      if (idx >= chunks.length) { stopAll(); return; }
      const utt       = new SpeechSynthesisUtterance(chunks[idx]);
      const sel       = voiceSelect.selectedOptions[0];
      const v         = sel ? synth.getVoices().find(x => x.name === sel.dataset.name) : null;
      if (v) utt.voice = v;
      utt.lang  = v ? v.lang : 'ja-JP';
      utt.rate  = SPEEDS[speedIdx];

      const chunkStart = chunkStarts[idx];
      utt.onboundary = (e) => {
        if (e.name !== 'word') return;
        highlightAt(chunkStart + e.charIndex, e.charLength || 1);
      };
      utt.onend   = () => { chunkIdx++; speakFrom(chunkIdx); };
      utt.onerror = (e) => {
        if (e.error !== 'interrupted' && e.error !== 'canceled') stopAll();
      };
      synth.speak(utt);
    }

    function startReading() {
      const text = textInput.value.trim();
      if (!text) { textInput.focus(); return; }

      synth.cancel();
      buildChunks(text);
      chunkIdx   = 0;
      totalChars = text.length;
      pauseAt    = 0;
      startTime  = Date.now();
      isPaused   = false;

      showDisplay();
      cancelAnimationFrame(rafId);
      rafId = requestAnimationFrame(tickProgress);
      speakFrom(0);
      setPlaying(true);
    }

    function stopAll() {
      synth.cancel();
      cancelAnimationFrame(rafId);
      startTime = null;
      isPaused  = false;
      pauseAt   = 0;
      progressFill.style.width = '0%';
      timeElapsed.textContent  = '0:00';
      timeRemain.textContent   = '0:00';
      setPlaying(false);
      btnStop.disabled   = true;
      btnRewind.disabled = true;
      hideDisplay();
    }

    btnPlayPause.addEventListener('click', () => {
      if (!synth.speaking && !isPaused) {
        startReading();
      } else if (synth.speaking && !synth.paused) {
        synth.pause();
        isPaused  = true;
        pauseAt  += (Date.now() - startTime) / 1000;
        startTime = null;
        cancelAnimationFrame(rafId);
        setPlaying(false);
        btnStop.disabled = false;
      } else if (isPaused) {
        synth.resume();
        isPaused  = false;
        startTime = Date.now();
        rafId = requestAnimationFrame(tickProgress);
        setPlaying(true);
      }
    });

    btnStop.addEventListener('click', stopAll);

    btnRewind.addEventListener('click', () => {
      const currentSecs = isPaused ? pauseAt : pauseAt + (Date.now() - startTime) / 1000;
      const targetSecs  = Math.max(0, currentSecs - 15);
      const targetChars = targetSecs * 5 * SPEEDS[speedIdx];
      const targetIdx   = Math.max(0, Math.min(chunks.length - 1, Math.floor(targetChars / 200)));

      synth.cancel();
      cancelAnimationFrame(rafId);
      chunkIdx  = targetIdx;
      pauseAt   = targetSecs;
      startTime = Date.now();
      isPaused  = false;
      rafId = requestAnimationFrame(tickProgress);
      speakFrom(chunkIdx);
      setPlaying(true);
    });

    // ── Progress bar drag ──
    const progressWrap = document.getElementById('progress-wrap');
    let isDragging = false;
    let wasPlaying = false;

    function getRatio(clientX) {
      const rect = progressWrap.getBoundingClientRect();
      return Math.min(1, Math.max(0, (clientX - rect.left) / rect.width));
    }

    function applyRatioVisual(ratio) {
      progressFill.style.width = (ratio * 100) + '%';
      const total = estimateDuration(totalChars);
      const secs  = ratio * total;
      timeElapsed.textContent = fmt(secs);
      timeRemain.textContent  = '-' + fmt(Math.max(0, total - secs));
    }

    function seekToRatio(ratio) {
      if (!totalChars) return;
      const total      = estimateDuration(totalChars);
      const targetSecs = ratio * total;
      const targetIdx  = Math.max(0, Math.min(chunks.length - 1, Math.floor(ratio * totalChars / 200)));

      chunkIdx = targetIdx;
      pauseAt  = targetSecs;
      applyRatioVisual(ratio);

      if (wasPlaying) {
        startTime = Date.now();
        isPaused  = false;
        cancelAnimationFrame(rafId);
        rafId = requestAnimationFrame(tickProgress);
        speakFrom(chunkIdx);
        setPlaying(true);
      }
    }

    function onDragStart(clientX) {
      if (!totalChars) return;
      isDragging = true;
      wasPlaying = synth.speaking && !synth.paused;
      if (wasPlaying) { synth.cancel(); cancelAnimationFrame(rafId); }
      progressWrap.classList.add('dragging');
      applyRatioVisual(getRatio(clientX));
    }

    function onDragMove(clientX) {
      if (!isDragging) return;
      applyRatioVisual(getRatio(clientX));
    }

    function onDragEnd(clientX) {
      if (!isDragging) return;
      isDragging = false;
      progressWrap.classList.remove('dragging');
      seekToRatio(getRatio(clientX));
    }

    progressWrap.addEventListener('mousedown',  (e) => { onDragStart(e.clientX); e.preventDefault(); });
    document.addEventListener('mousemove',      (e) => onDragMove(e.clientX));
    document.addEventListener('mouseup',        (e) => onDragEnd(e.clientX));

    progressWrap.addEventListener('touchstart', (e) => onDragStart(e.touches[0].clientX), { passive: true });
    document.addEventListener('touchmove',      (e) => { if (isDragging) onDragMove(e.touches[0].clientX); }, { passive: true });
    document.addEventListener('touchend',       (e) => onDragEnd(e.changedTouches[0].clientX));

    window.addEventListener('beforeunload', () => synth.cancel());
  </script>
</body>
</html>
